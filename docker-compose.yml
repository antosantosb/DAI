services:
  # ==========================================
  # 1. BROKER MQTT (Mosquitto)
  # ==========================================
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - mqtt_net

  # ==========================================
  # 2. SIMULADOR DE TELEMETRIA
  # ==========================================
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: simulator
    restart: unless-stopped
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=tub/telemetry
      - INTERVAL_SECONDS=1
      - BACKEND_URL=http://spring-boot-backend:8081
      - PGU_INTERNAL_API_KEY=${PGU_INTERNAL_API_KEY:-changeme-internal-key}
    depends_on:
      - mosquitto
      - spring-boot-backend
      - osrm
    networks:
      - mqtt_net
      - etl_net
      - osrm_net

  # ==========================================
  # 2.1 ORQUESTRADOR ETL (Apache Airflow)
  # ==========================================
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${TOOLS_DB_USER}:${TOOLS_DB_PASSWORD}@toolsbd:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_ADMIN_USER}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD}
      - BACKEND_URL=http://spring-boot-backend:8081
      - GTFS_URL=https://www.tub.pt/developer/gtfs/feed/tub.zip
    command: bash -c "airflow db migrate && airflow users create --username $${_AIRFLOW_WWW_USER_USERNAME} --password $${_AIRFLOW_WWW_USER_PASSWORD} --firstname Admin --lastname PGU --role Admin --email admin@pgu.local 2>/dev/null; airflow webserver -D && airflow scheduler"
    depends_on:
      toolsbd:
        condition: service_healthy
      spring-boot-backend:
        condition: service_started
      osrm:
        condition: service_started
    networks:
      - tools_db_net
      - etl_net
      - osrm_net

  # ==========================================
  # 3. MOTOR ETL (Apache NiFi)
  # ==========================================
  nifi:
    image: apache/nifi:2.0.0
    container_name: nifi
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      - NIFI_WEB_HTTPS_HOST=0.0.0.0
      - SINGLE_USER_CREDENTIALS_USERNAME=${NIFI_USERNAME}
      - SINGLE_USER_CREDENTIALS_PASSWORD=${NIFI_PASSWORD}
      - PGU_INTERNAL_API_KEY=${PGU_INTERNAL_API_KEY:-changeme-internal-key}
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_database:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository
    depends_on:
      - mosquitto
    networks:
      - mqtt_net
      - etl_net

  # ==========================================
  # 4. DATA WAREHOUSE (PostgreSQL + PostGIS)
  # ==========================================
  postgres_postgis:
    image: postgis/postgis:15-3.4
    container_name: datawarehouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${DW_USER}
      POSTGRES_PASSWORD: ${DW_PASSWORD}
      POSTGRES_DB: ${DW_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dw_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DW_USER} -d ${DW_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 5. CONTEXT BROKER (FIWARE Orion + MongoDB)
  # ==========================================
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - orion_db_net
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  fiware_orion:
    image: fiware/orion:3.9.0
    container_name: orion
    restart: unless-stopped
    command: -dbhost mongodb -dbuser ${MONGO_USER} -dbpwd ${MONGO_PASSWORD}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - orion_db_net
      - etl_net

  # ==========================================
  # 6. DB FERRAMENTAS (Keycloak + Metabase)
  # ==========================================
  toolsbd:
    image: postgres:15
    container_name: toolsbd
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TOOLS_DB_USER}
      POSTGRES_PASSWORD: ${TOOLS_DB_PASSWORD}
    volumes:
      - tools_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - tools_db_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${TOOLS_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 7. GESTÃO DE IDENTIDADE (Keycloak)
  # ==========================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.4
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://toolsbd:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${TOOLS_DB_USER}
      KC_DB_PASSWORD: ${TOOLS_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${IAM_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${IAM_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/pgu-realm-realm.json:/opt/keycloak/data/import/pgu-realm-realm.json:ro
      - ./keycloak/themes/pgu:/opt/keycloak/themes/pgu:ro
    depends_on:
      toolsbd:
        condition: service_healthy
    networks:
      - tools_db_net
      - auth_net

  # ==========================================
  # 8. DASHBOARDS (Metabase)
  # ==========================================
  metabase:
    image: metabase/metabase:v0.52.4
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: toolsbd
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${METABASE_DB_NAME}
      MB_DB_USER: ${TOOLS_DB_USER}
      MB_DB_PASS: ${TOOLS_DB_PASSWORD}
    depends_on:
      postgres_postgis:
        condition: service_healthy
      toolsbd:
        condition: service_healthy
    networks:
      - tools_db_net
      - dw_net

  # ==========================================
  # 9. BACKEND SPRING BOOT
  # ==========================================
  spring-boot-backend:
    build:
      context: ./pgu
      dockerfile: Dockerfile
    container_name: spring-boot-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DW_USER=${DW_USER}
      - DW_PASSWORD=${DW_PASSWORD}
      - OSRM_URL=http://osrm:5000
      - PGU_EXPORT_DIR=/var/pgu/exports
      - PGU_INTERNAL_API_KEY=${PGU_INTERNAL_API_KEY:-changeme-internal-key}
    volumes:
      # Motor de Exportação Massiva: persistência dos CSV/PDF gerados
      - pgu_exports:/var/pgu/exports
    depends_on:
      postgres_postgis:
        condition: service_healthy
      keycloak:
        condition: service_started
      osrm:
        condition: service_started
    networks:
      - dw_net
      - etl_net
      - auth_net
      - osrm_net

  # ==========================================
  # 10. OSRM (Routing Engine — Portugal)
  # ==========================================
  osrm:
    build:
      context: ./osrm
      dockerfile: Dockerfile
    container_name: osrm
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - osrm_net

# ==========================================
# REDES (Micro-Segmentação Zero Trust)
# ==========================================
#
# mqtt_net:     Simulator -> Mosquitto -> NiFi
# etl_net:      NiFi -> Spring Boot (API) + NiFi -> Fiware Orion (API)
# dw_net:       Spring Boot <-> PostgreSQL/PostGIS + Metabase -> PostGIS
# orion_db_net: Fiware Orion <-> MongoDB
# tools_db_net: Keycloak/Metabase <-> toolsbd (PostgreSQL)
# auth_net:     Spring Boot -> Keycloak (validação JWT)
#
networks:
  mqtt_net:
    driver: bridge
  etl_net:
    driver: bridge
  dw_net:
    driver: bridge
  orion_db_net:
    driver: bridge
  tools_db_net:
    driver: bridge
  auth_net:
    driver: bridge
  osrm_net:
    driver: bridge

# ==========================================
# VOLUMES
# ==========================================
volumes:
  mosquitto_data:
  mosquitto_log:
  nifi_conf:
  nifi_database:
  nifi_flowfile:
  nifi_content:
  nifi_provenance:
  postgres_data:
  mongo_data:
  tools_data:
  pgu_exports:
