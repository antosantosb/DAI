services:
  # ==========================================
  # 1. DATABASE DE INFRAESTRUTURA
  # ==========================================
  postgres_tools:
    image: postgres:15-alpine
    container_name: toolsdb
    environment:
      POSTGRES_USER: tools_admin
      POSTGRES_PASSWORD: tools_password
      POSTGRES_DB: pgu_tools
    volumes:
      - tools_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - pgu_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tools_admin -d pgu_tools"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. DATA WAREHOUSE
  # ==========================================
  postgres_postgis:
    image: postgis/postgis:15-3.3
    container_name: datawarehouse
    environment:
      POSTGRES_USER: pgu_admin
      POSTGRES_PASSWORD: pgu_password
      POSTGRES_DB: pgu_history
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pgu_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgu_admin -d pgu_history"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 3. SEGURANÇA E IDENTIDADE (Keycloak)
  # ==========================================
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_tools:5432/db_keycloak
      KC_DB_USERNAME: tools_admin
      KC_DB_PASSWORD: tools_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres_tools:
        condition: service_healthy
    networks:
      - pgu_network

  # ==========================================
  # 4. ANALÍTICA (Metabase)
  # ==========================================
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: db_metabase
      MB_DB_USER: tools_admin
      MB_DB_PASS: tools_password
      MB_DB_HOST: postgres_tools
    ports:
      - "3000:3000"
    depends_on:
      postgres_tools:
        condition: service_healthy
    networks:
      - pgu_network

  # ==========================================
  # 5. INGESTÃO DE DADOS (Mosquitto)
  # ==========================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883" 
      - "9001:9001" 
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - pgu_network

  # ==========================================
  # 6. CONTEXT BROKER (Orion + MongoDB)
  # ==========================================
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - pgu_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  fiware_orion:
    image: fiware/orion:3.9.0
    container_name: orion
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "1026:1026"
    command: -dbhost mongodb
    networks:
      - pgu_network

  # ==============================================
  # 7. Motor de Ingestão e ETL (Apache NiFi) 
  # ==============================================
  nifi:
    image: apache/nifi:latest
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=pgu_admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=pgu_nifi_password
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_flow:/opt/nifi/nifi-current/flow_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository
      - nifi_database:/opt/nifi/nifi-current/database_repository 
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_state:/opt/nifi/nifi-current/state_management
    networks:
      - pgu_network

  # ==========================================
  # 8. ORQUESTRAÇÃO (Apache Airflow)
  # ==========================================
  airflow-init:
    image: apache/airflow:2.8.1
    container_name: tub_airflow_init
    depends_on:
      postgres_tools:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://tools_admin:tools_password@postgres_tools/db_airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    networks:
      - pgu_network

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: tub_airflow_webserver
    restart: always
    depends_on:
      postgres_tools:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://tools_admin:tools_password@postgres_tools/db_airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    ports:
      - "8090:8080"
    command: webserver
    networks:
      - pgu_network

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: tub_airflow_scheduler
    restart: always
    depends_on:
      postgres_tools:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://tools_admin:tools_password@postgres_tools/db_airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    command: scheduler
    networks:
      - pgu_network

    # ==========================================
    # 9. NO-CODE ENGINE (Node-RED)
    # ==========================================
  nodered:
      image: nodered/node-red:latest
      container_name: nodered
      restart: always
      ports:
        - "1880:1880"
      environment:
        - TZ=Europe/Lisbon
      volumes:
        - nodered_data:/data
      depends_on:
        - mosquitto
      networks:
        - pgu_network

# ==========================================
# DEFINIÇÃO DE REDES E VOLUMES
# ==========================================
networks:
  pgu_network:
    driver: bridge

volumes:
  postgres_data:
  tools_data:
  mongo_data:
  mosquitto_data:
  mosquitto_log:
  nifi_conf:
  nifi_flow:
  nifi_provenance:
  nifi_database:
  nifi_flowfile:
  nifi_content:
  nifi_state: