services:
  # ==========================================
  # 1. INGESTÃO DE DADOS (Broker MQTT)
  # ==========================================
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - frontend_net

  # ==============================================
  # 2. MOTOR DE ORQUESTRAÇÃO E ETL (Apache NiFi)
  # ==============================================
  nifi:
    image: apache/nifi:latest
    container_name: nifi
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=${NIFI_USERNAME}
      - SINGLE_USER_CREDENTIALS_PASSWORD=${NIFI_PASSWORD}
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_database:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository
    networks:
      - frontend_net
      - backend_db_net

  # ==========================================
  # 3. DATA WAREHOUSE
  # ==========================================
  postgres_postgis:
    image: postgis/postgis:15-3.4
    container_name: datawarehouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${DW_USER}
      POSTGRES_PASSWORD: ${DW_PASSWORD}
      POSTGRES_DB: ${DW_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_db_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DW_USER} -d ${DW_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 4. CONTEXT BROKER (FIWARE Orion + MongoDB)
  # ==========================================
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - orion_db_net
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  fiware_orion:
    image: fiware/orion:3.9.0
    container_name: orion
    restart: unless-stopped
    command: -dbhost mongodb -dbuser ${MONGO_USER} -dbpwd ${MONGO_PASSWORD}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - frontend_net
      - orion_db_net

  # ==========================================
  # 5. DB FERRAMENTAS (Keycloak, Airflow, Metabase)
  # ==========================================
  toolsbd:
    image: postgres:15
    container_name: toolsbd
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TOOLS_DB_USER}
      POSTGRES_PASSWORD: ${TOOLS_DB_PASSWORD}
    volumes:
      - tools_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - tools_db_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${TOOLS_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 6. GESTÃO DE IDENTIDADE (Keycloak)
  # ==========================================
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://toolsbd:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${TOOLS_DB_USER}
      KC_DB_PASSWORD: ${TOOLS_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${IAM_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${IAM_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      toolsbd:
        condition: service_healthy
    networks:
      - frontend_net
      - tools_db_net

  # ==========================================
  # 7. ORQUESTRAÇÃO ETL (Apache Airflow)
  # ==========================================
  airflow-init:
    image: apache/airflow:2.7.3
    container_name: airflow_init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${TOOLS_DB_USER}:${TOOLS_DB_PASSWORD}@toolsbd:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_WWW_USER_USERNAME}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_WWW_USER_PASSWORD}
      - _AIRFLOW_WWW_USER_ROLE=Admin
    command: version
    depends_on:
      toolsbd:
        condition: service_healthy
    networks:
      - tools_db_net

  airflow-webserver:
    image: apache/airflow:2.7.3
    container_name: airflow_webserver
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${TOOLS_DB_USER}:${TOOLS_DB_PASSWORD}@toolsbd:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - frontend_net
      - tools_db_net
      - backend_db_net

  airflow-scheduler:
    image: apache/airflow:2.7.3
    container_name: airflow_scheduler
    restart: unless-stopped
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${TOOLS_DB_USER}:${TOOLS_DB_PASSWORD}@toolsbd:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - tools_db_net
      - backend_db_net

  # ==========================================
  # 8. DASHBOARDS (Metabase)
  # ==========================================
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: toolsbd
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${METABASE_DB_NAME}
      MB_DB_USER: ${TOOLS_DB_USER}
      MB_DB_PASS: ${TOOLS_DB_PASSWORD}
    depends_on:
      postgres_postgis:
        condition: service_healthy
      toolsbd:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_db_net
      - tools_db_net

  # ==========================================
  # 9. BACKEND SPRING BOOT
  # ==========================================
  spring-boot_backend:
    build:
      context: ./pgu
      dockerfile: Dockerfile
    container_name: spring-boot_backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DW_USER=${DW_USER}
      - DW_PASSWORD=${DW_PASSWORD}
    depends_on:
      postgres_postgis:
        condition: service_healthy
      keycloak:
        condition: service_started
      mosquitto:
        condition: service_started
    networks:
      - frontend_net
      - backend_db_net

# ==========================================
# DEFINIÇÃO DE REDES (ZERO TRUST)
# ==========================================
networks:
  frontend_net:
    driver: bridge

  backend_db_net:
    driver: bridge

  orion_db_net:
    driver: bridge

  tools_db_net:
    driver: bridge

# ==========================================
# DEFINIÇÃO DE VOLUMES
# ==========================================
volumes:
  mosquitto_data:
  mosquitto_log:
  nifi_conf:
  nifi_database:
  nifi_flowfile:
  nifi_content:
  nifi_provenance:
  postgres_data:
  mongo_data:
  tools_data: