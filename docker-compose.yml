services:
  # ==========================================
  # 1. DATABASE DE INFRAESTRUTURA
  # ==========================================
  postgres_tools:
    image: postgres:15-alpine
    container_name: pgu_tools_db
    environment:
      POSTGRES_USER: tools_admin
      POSTGRES_PASSWORD: tools_password
      POSTGRES_DB: pgu_tools
    volumes:
      - tools_data:/var/lib/postgresql/data
    networks:
      - pgu_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tools_admin -d pgu_tools"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. DATA WAREHOUSE
  # ==========================================
  postgres_postgis:
    image: postgis/postgis:15-3.3
    container_name: pgu_datawarehouse
    environment:
      POSTGRES_USER: pgu_admin
      POSTGRES_PASSWORD: pgu_password
      POSTGRES_DB: pgu_history
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pgu_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgu_admin -d pgu_history"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 3. SEGURANÇA E IDENTIDADE (Keycloak)
  # ==========================================
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: pgu_keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_tools:5432/pgu_tools
      KC_DB_USERNAME: tools_admin
      KC_DB_PASSWORD: tools_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres_tools:
        condition: service_healthy
    networks:
      - pgu_network

  # ==========================================
  # 4. ANALÍTICA (Metabase)
  # ==========================================
  metabase:
    image: metabase/metabase:latest
    container_name: pgu_metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: pgu_tools
      MB_DB_USER: tools_admin
      MB_DB_PASS: tools_password
      MB_DB_HOST: postgres_tools
    ports:
      - "3000:3000"
    depends_on:
      postgres_tools:
        condition: service_healthy
    networks:
      - pgu_network

  # ==========================================
  # 5. INGESTÃO DE DADOS (Mosquitto)
  # ==========================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: pgu_mosquitto
    ports:
      - "1883:1883" 
      - "9001:9001" 
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - pgu_network

  # ==========================================
  # 6. CONTEXT BROKER (Orion + MongoDB)
  # ==========================================
  mongodb:
    image: mongo:6.0
    container_name: pgu_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - pgu_network

  fiware_orion:
    image: fiware/orion:3.9.0
    container_name: pgu_orion
    depends_on:
      - mongodb
    ports:
      - "1026:1026"
    command: -dbhost mongodb
    networks:
      - pgu_network

# ==========================================
# DEFINIÇÃO DE REDES E VOLUMES
# ==========================================
networks:
  pgu_network:
    driver: bridge

volumes:
  postgres_data:
  tools_data:
  mongo_data:
  mosquitto_data:
  mosquitto_log: