# ==========================================
# CONFIGURAÇÃO DO SERVIDOR
# ==========================================
server.port=8081

# ==========================================
# 1. LIGAÇÃO À DATA WAREHOUSE
# ==========================================
spring.datasource.url=jdbc:postgresql://datawarehouse:5432/pgu_datawarehouse
spring.datasource.username=${DW_USER}
spring.datasource.password=${DW_PASSWORD}
# Hibernate valida as tabelas criadas pelo FLYWAY
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ==========================================
# 2. FLYWAY (Migrações da Data Warehouse)
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==========================================
# 3. SEGURANÇA E ZERO TRUST (KEYCLOAK)
# ==========================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/pgu-realm/protocol/openid-connect/certs
# issuer-uri omitido intencionalmente: o browser obtém tokens de localhost:8080
# mas o backend acede ao Keycloak via hostname Docker (keycloak:8080).
# Validar apenas a assinatura via jwk-set-uri evita o issuer mismatch.

# ==========================================
# 3.1 API KEY INTERNA (machine-to-machine: simulador, Airflow)
# ==========================================
pgu.internal.api-key=${PGU_INTERNAL_API_KEY:changeme-internal-key}

# ==========================================
# 4. OSRM (Routing Engine)
# ==========================================
osrm.url=${OSRM_URL:http://osrm:5000}

# ==========================================
# 5. EMAIL (SMTP) — opcional, alertas funcionam sem SMTP configurado
# ==========================================
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}

# ==========================================
# 5.1 ALERTAS CRÍTICOS
# ==========================================
# Cooldown entre alertas repetidos do mesmo autocarro (minutos).
pgu.alertas.cooldown-minutes=${PGU_ALERTAS_COOLDOWN:5}
# Destinatário dos emails de alerta (vazio = email desativado).
pgu.alertas.email.destinatario=${PGU_ALERTAS_EMAIL:}
# Remetente dos emails de alerta.
pgu.alertas.email.remetente=${PGU_ALERTAS_EMAIL_FROM:sistema@tub.pt}

# ==========================================
# 6. MOTOR DE EXPORTAÇÃO MASSIVA
# ==========================================
# Diretório onde ficam guardados os relatórios gerados (CSV/PDF).
# No container, montar um volume para /var/pgu/exports.
pgu.export.dir=${PGU_EXPORT_DIR:/var/pgu/exports}
# Retenção automática dos ficheiros (dias). Uma tarefa agendada às 03:00
# Europe/Lisbon apaga ficheiros + rows de jobs concluídos há mais tempo.
pgu.export.retention-days=${PGU_EXPORT_RETENTION_DAYS:7}

# ==========================================
# 7. TELEMETRIA — uptime (duty-cycle)
# ==========================================
# Intervalo de publicação esperado (segundos). Deve refletir o hardware IoT real:
#   - Simulador interno ......... 5
#   - GPS celular (4G/5G) ...... 10-30
#   - MQTT industrial ............ 5-30
#   - LoRaWAN ................. 60-300
pgu.telemetry.expected-interval-sec=${PGU_TELEMETRY_INTERVAL_SEC:5}
# Janela (horas) para cálculo do uptime diário.
pgu.telemetry.uptime-window-hours=${PGU_TELEMETRY_UPTIME_WINDOW:24}
