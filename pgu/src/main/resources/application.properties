# ==========================================
# CONFIGURAÇÃO DO SERVIDOR
# ==========================================
server.port=8081

# ==========================================
# 1. LIGAÇÃO À DATA WAREHOUSE
# ==========================================
spring.datasource.url=jdbc:postgresql://datawarehouse:5432/pgu_datawarehouse
spring.datasource.username=${DW_USER}
spring.datasource.password=${DW_PASSWORD}
# Hibernate valida as tabelas criadas pelo FLYWAY
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ==========================================
# 2. FLYWAY (Migrações da Data Warehouse)
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==========================================
# 3. SEGURANÇA E ZERO TRUST (KEYCLOAK)
# ==========================================
# JWT desativado até o realm pgu-realm ser criado no Keycloak.
# Reativar quando configurado:
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/pgu-realm/protocol/openid-connect/certs
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/pgu-realm

# ==========================================
# 4. OSRM (Routing Engine)
# ==========================================
osrm.url=${OSRM_URL:http://osrm:5000}

# ==========================================
# 5. EMAIL (SMTP)
# ==========================================
spring.mail.host=smtp.teu-servidor.com
spring.mail.port=587
spring.mail.username=o-teu-email
spring.mail.password=a-tua-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true